name: Release Build & Deploy
# 프로덕션 빌드: release 브랜치 → 프로덕션 서버
# Android: AAB → Google Play Production
# iOS: IPA → App Store Connect (API Key 자동 서명)

on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Android: AAB 빌드 → Google Play Production
  # ─────────────────────────────────────────────
  build-android:
    name: 🤖 Android Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: printf '%s' "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Calculate Build Number
        id: build_number
        run: |
          BUILD_NUMBER=$((1000 + (${{ github.run_number }} % 1000)))
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "📦 릴리즈 빌드 번호: $BUILD_NUMBER"

      - name: Build AAB (Production)
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name=1.0.${{ github.run_number }} \
            --build-number=${{ steps.build_number.outputs.build_number }} \
            --dart-define=API_ENV=prod

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-prod-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload to Google Play (Production)
        if: env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        uses: r0adkll/upload-google-play@v1
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.dime.tomotomo
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed

  # ─────────────────────────────────────────────
  # iOS: IPA 빌드 → App Store Connect
  # App Store Connect API Key로 자동 서명 (인증서/프로파일 자동 관리)
  # ─────────────────────────────────────────────
  build-ios:
    name: 🍎 iOS Build & Deploy
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: printf '%s' "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          for i in {1..3}; do
            echo "Pod install 시도 ($i/3)..."
            if pod install --repo-update; then
              echo "✅ Pod install 성공"
              break
            fi
            [ $i -lt 3 ] && echo "⚠️ 실패, 10초 후 재시도..." && sleep 10
          done

      - name: Setup App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$APP_STORE_CONNECT_API_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          echo "✅ API 키 설정 완료: AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      - name: Calculate Build Number
        id: build_number
        run: |
          BUILD_NUMBER=$((1000 + (${{ github.run_number }} % 1000)))
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "📦 릴리즈 빌드 번호: $BUILD_NUMBER"

      - name: Flutter Build iOS (no codesign)
        run: |
          flutter build ios --release \
            --no-codesign \
            --dart-define=API_ENV=prod

      - name: Xcode Archive
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          API_KEY_PATH=~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            FLUTTER_BUILD_NUMBER=${{ steps.build_number.outputs.build_number }} \
            FLUTTER_BUILD_NAME=1.0.${{ github.run_number }} \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Xcode Export IPA
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          API_KEY_PATH=~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions-prod.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-prod-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 90

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "📤 업로드 파일: $IPA_FILE"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey $APP_STORE_CONNECT_API_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID \
            || echo "⚠️ App Store 업로드 실패 — IPA는 아티팩트에 저장됨"
