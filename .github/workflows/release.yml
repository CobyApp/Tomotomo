name: Release Build & Deploy
# 프로덕션 빌드: release 브랜치 → 프로덕션 서버
# Android: AAB → Google Play Production
# iOS: IPA → App Store Connect

on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Android: AAB 빌드 → Google Play Production
  # ─────────────────────────────────────────────
  build-android:
    name: 🤖 Android Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Calculate Build Number
        id: build_number
        run: |
          BUILD_NUMBER=$((1000 + (${{ github.run_number }} % 1000)))
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "📦 릴리즈 빌드 번호: $BUILD_NUMBER"

      - name: Build AAB (Production)
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name=1.0.${{ github.run_number }} \
            --build-number=${{ steps.build_number.outputs.build_number }} \
            --dart-define=API_ENV=prod

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-prod-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload to Google Play (Production)
        if: env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        uses: r0adkll/upload-google-play@v1
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.dime.tomotomo
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed

  # ─────────────────────────────────────────────
  # iOS: IPA 빌드 → App Store Connect
  # ─────────────────────────────────────────────
  build-ios:
    name: 🍎 iOS Build & Deploy
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          for i in {1..3}; do
            echo "Pod install 시도 ($i/3)..."
            if pod install --repo-update; then
              echo "✅ Pod install 성공"
              break
            fi
            [ $i -lt 3 ] && echo "⚠️ 실패, 10초 후 재시도..." && sleep 10
          done

      - name: Setup Certificates & Provisioning Profile
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # 키체인 설정
          security create-keychain -p "" build.keychain || true
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # 인증서 import
          echo "$APPLE_CERTIFICATE_BASE64" | base64 -d > cert.p12
          security import cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign || exit 1
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "" build.keychain || true

          # 프로비저닝 프로파일 설치
          if [ -n "$APPLE_PROVISIONING_PROFILE_BASE64" ]; then
            echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 -d > profile.mobileprovision

            TEMP_PLIST=$(mktemp)
            security cms -D -i profile.mobileprovision > "$TEMP_PLIST"
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$TEMP_PLIST")
            PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$TEMP_PLIST" 2>/dev/null || echo "")
            PROFILE_TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$TEMP_PLIST" 2>/dev/null || echo "")
            rm -f "$TEMP_PLIST"

            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp profile.mobileprovision \
              ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
            chmod 644 \
              ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

            # ExportOptions 업데이트
            /usr/libexec/PlistBuddy -c \
              "Delete :provisioningProfiles" ios/ExportOptions-prod.plist 2>/dev/null || true
            /usr/libexec/PlistBuddy -c \
              "Add :provisioningProfiles dict" ios/ExportOptions-prod.plist
            /usr/libexec/PlistBuddy -c \
              "Add :provisioningProfiles:com.dime.tomotomo string $PROFILE_UUID" \
              ios/ExportOptions-prod.plist

            /usr/libexec/PlistBuddy -c \
              "Set :signingStyle manual" ios/ExportOptions-prod.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c \
              "Add :signingStyle string manual" ios/ExportOptions-prod.plist

            /usr/libexec/PlistBuddy -c \
              "Set :teamID $PROFILE_TEAM_ID" ios/ExportOptions-prod.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c \
              "Add :teamID string $PROFILE_TEAM_ID" ios/ExportOptions-prod.plist

            # Xcode 프로젝트 서명 방식 변경
            sed -i '' \
              's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
              ios/Runner.xcodeproj/project.pbxproj || true
            sed -i '' \
              's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' \
              ios/Runner.xcodeproj/project.pbxproj || true
            sed -i '' \
              "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\";/g" \
              ios/Runner.xcodeproj/project.pbxproj || true
          fi

      - name: Calculate Build Number
        id: build_number
        run: |
          BUILD_NUMBER=$((1000 + (${{ github.run_number }} % 1000)))
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "📦 릴리즈 빌드 번호: $BUILD_NUMBER"

      - name: Build IPA (Production)
        run: |
          flutter build ipa --release \
            --build-name=1.0.${{ github.run_number }} \
            --build-number=${{ steps.build_number.outputs.build_number }} \
            --dart-define=API_ENV=prod \
            --export-options-plist=ios/ExportOptions-prod.plist

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-prod-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 90

      - name: Upload to App Store Connect
        if: env.APP_STORE_CONNECT_API_KEY_ID != ''
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > \
            ~/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8
          chmod 600 \
            ~/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8

          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "📤 업로드 파일: $IPA_FILE"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey $APP_STORE_CONNECT_API_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID \
            || echo "⚠️ App Store 업로드 실패 — IPA는 아티팩트에 저장됨"
